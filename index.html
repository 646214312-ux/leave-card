<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ededed;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .share-card {
      width: 78%;
      max-width: 360px;
      background: #fff;
      border-radius: 7px;
      padding: 18px 16px 14px;
    }

    .main {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .text {
      flex: 1;
      min-width: 0;
      padding-right: 16px;
    }

    .title {
      font-size: 21px;
      line-height: 29px;
      color: #111;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 17px;
      line-height: 24px;
      color: #777;
      font-weight: 500;
    }

    .logo {
      width: 68px;
      height: 68px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .source {
      margin-top: 18px;
      display: flex;
      align-items: center;
      color: #777;
      font-size: 17px;
      font-weight: 600;
      line-height: 22px;
    }

    .source-icon {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      margin-right: 6px;
      object-fit: cover;
    }

    .loading {
      position: fixed;
      bottom: 38px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="share-card">
    <div class="main">
      <div class="text">
        <div class="title">分享请假信息</div>
        <div class="desc">分享请假信息</div>
      </div>
      <img class="logo" src="https://646214312-ux.github.io/leave-card/logo.png" alt="">
    </div>

    <div class="source">
      <img class="source-icon" src="https://646214312-ux.github.io/leave-card/logo.png" alt="">
      <span>演示 app</span>
    </div>
  </div>

  <div class="loading">正在打开...</div>

  <script>
    const targetUrl = "https://xyz.yihuanxinxi.com/#/pages/leave-apply/olddetail?id=8139&share_token=6871e0cc77db2e01a7028bd0cb760338_3237";

      window.location.href = targetUrl;
    }, 1500);
